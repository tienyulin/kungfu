[tool.black]
line-length = 100
target-version = ["py314"]

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
warn_unused_ignores = true
check_untyped_defs = true

[tool.pylint.main]
py-version = "3.14"

[tool.pylint.format]
max-line-length = 100

[tool.pylint.messages_control]
# Each skill bundles self-contained stdlib scripts (no cross-skill imports allowed),
# so small parsers/boilerplate are duplicated by design.
disable = ["duplicate-code"]

[tool.pytest.ini_options]
testpaths = ["tests"]
