name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: black
        run: black --check .
      - name: flake8
        run: flake8 .
      - name: mypy
        run: mypy .
      - name: pylint
        run: pylint $(find . -name "*.py")
      - name: validate skills
        run: python skill-author/scripts/validate_skill.py
      - name: unit tests
        run: python -m unittest discover -s tests -t tests -v
      - name: localize self-test
        run: bash localize.sh --self-test
      - name: envrun self-test
        run: bash skill-author/scripts/envrun.sh --self-test
