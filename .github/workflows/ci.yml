name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: verify (lint + tests + validators)
        run: bash verify.sh
      - name: envrun self-test
        run: bash skill-author/scripts/envrun.sh --self-test
