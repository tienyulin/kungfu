repos:
  - repo: local
    hooks:
      # Linters run from the locally-installed toolchain (requirements.txt) — no
      # network fetch, so this works on an air-gapped intranet.
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
      # The test suite (tests/ — pure stdlib, run under pytest).
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
      # The offline validator checks the real repo's spec + marketplace registration.
      - id: validate-skills
        name: validate skills
        entry: python skills/skill-author/scripts/validate_skill.py
        language: system
        pass_filenames: false
        always_run: true
      - id: localize-self-test
        name: localize self-test
        entry: bash localize.sh --self-test
        language: system
        pass_filenames: false
        always_run: true
      - id: skills-sync-self-test
        name: skills-sync self-test
        entry: bash skills-sync.test.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: envrun-self-test
        name: envrun self-test
        entry: bash skills/skill-author/scripts/envrun.sh --self-test
        language: system
        pass_filenames: false
        always_run: true
