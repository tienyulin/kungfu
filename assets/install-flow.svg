<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
  <title>Kungfu Install / Runtime Flow</title>
  <desc>From clone through skills-sync, a sticky check and per-agent hook generation, into per-turn runtime constitution injection and guard, then self-refresh.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .b{fill:#f4f4f5;stroke:#d4d4d8;stroke-width:1.5;}
      .dec{fill:#fafafa;stroke:#9ca3af;stroke-width:1.5;}
      .acc{fill:#fef2f2;stroke:#dc2626;stroke-width:1.5;}
      .t{fill:#18181b;font-size:13.5px;font-weight:600;}
      .s{fill:#6b7280;font-size:11px;}
      .e{stroke:#6b7280;stroke-width:1.6;fill:none;}
      .lbl{fill:#6b7280;font-size:10.5px;font-weight:600;}
      .cap{fill:#6b7280;font-size:11px;font-weight:700;letter-spacing:.06em;}
    </style>
  </defs>

  <text x="30" y="30" class="cap">ONE-TIME INSTALL</text>

  <rect x="30" y="42" width="300" height="64" rx="10" class="b"/>
  <text x="46" y="68" class="t">Get the repo</text>
  <text x="46" y="88" class="s">plugin marketplace add  ／  git clone ~/kungfu</text>

  <path d="M180 106 L180 132" class="e" marker-end="url(#a)"/>

  <rect x="30" y="132" width="300" height="52" rx="10" fill="#18181b"/>
  <text x="46" y="153" fill="#fff" font-size="14" font-weight="700">skills-sync.sh</text>
  <text x="46" y="172" fill="#d4d4d8" font-size="11">install skills + wire agents</text>

  <path d="M180 184 L180 210" class="e" marker-end="url(#a)"/>

  <polygon points="180,210 330,250 180,290 30,250" class="dec"/>
  <text x="180" y="245" text-anchor="middle" class="t">Wire constitution?</text>
  <text x="180" y="263" text-anchor="middle" class="s">--constitution or sticky marker</text>

  <path d="M330 250 L430 250 L430 300" class="e" marker-end="url(#a)"/>
  <text x="345" y="243" class="lbl">no</text>
  <rect x="360" y="300" width="150" height="46" rx="9" class="b"/>
  <text x="376" y="322" class="s">skills only</text>
  <text x="376" y="338" class="s">(no discipline hooks)</text>

  <path d="M180 290 L180 316" class="e" marker-end="url(#a)"/>
  <text x="190" y="308" class="lbl">yes</text>
  <rect x="30" y="316" width="300" height="52" rx="10" class="acc"/>
  <text x="46" y="338" class="t">touch ~/.agents/.constitution-on</text>
  <text x="46" y="356" class="s">sticky: no flag needed next time</text>

  <path d="M180 368 L180 394" class="e" marker-end="url(#a)"/>

  <rect x="30" y="394" width="480" height="64" rx="10" class="b"/>
  <text x="46" y="420" class="t">Generate per-agent hooks (HOME-relative paths)</text>
  <text x="46" y="440" class="s">Codex hooks.json · Gemini settings+wrapper · Cline Hooks/ · OpenCode instructions[]</text>

  <line x1="30" y1="484" x2="770" y2="484" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="30" y="504" class="cap">PER-TURN RUNTIME (every agent session)</text>

  <rect x="70" y="516" width="230" height="60" rx="10" class="acc"/>
  <text x="86" y="540" class="t">SessionStart / TaskStart</text>
  <text x="86" y="559" class="s">inject 12-law constitution</text>

  <path d="M300 546 L340 546" class="e" marker-end="url(#a)"/>

  <rect x="340" y="516" width="230" height="60" rx="10" class="acc"/>
  <text x="356" y="540" class="t">PreToolUse — SAFETY guard</text>
  <text x="356" y="559" class="s">rm -rf / force-push / DROP → block</text>

  <path d="M570 546 L600 546" class="e" marker-end="url(#a)"/>

  <rect x="600" y="516" width="170" height="60" rx="10" class="b"/>
  <text x="616" y="540" class="t">agent works</text>
  <text x="616" y="559" class="s">rules live</text>

  <path d="M685 576 L685 620 L16 620 L16 158 L30 158" class="e" marker-end="url(#a)" stroke-dasharray="5 4"/>
  <text x="150" y="614" class="s">self-refresh: git pull latest rules → back to skills-sync</text>

  <path d="M510 426 L640 426 L640 516" class="e" marker-end="url(#a)"/>
  <text x="548" y="418" class="lbl">hooks ready</text>
</svg>
